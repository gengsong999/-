<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大疆考试管理 · 智能题库速查系统</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5f6e;
            --border: #e2e5ea;
            --accent: #f0a030;
            --accent-dark: #d4891a;
            --accent-light: #fff7ed;
            --primary: #1a1a2e;
            --danger: #e05050;
            --danger-light: #fef2f2;
            --success: #22b573;
            --success-light: #f0faf5;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
        }
        .navbar {
            background: var(--primary); color: #fff; padding: 0 20px; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .navbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; }
        .navbar-brand .logo-icon {
            width: 34px; height: 34px; background: var(--accent); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #1a1a2e; font-weight: 900;
        }
        .nav-stat { font-size: 0.8rem; color: #aab; display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.06); padding: 6px 12px; border-radius: 20px; }
        .nav-stat strong { color: var(--accent); font-size: 1rem; margin: 0 2px; }
        .btn-icon { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .btn-icon:hover { background: rgba(255,255,255,0.16); }
        .app-container { display: flex; min-height: calc(100vh - 56px); max-width: 1400px; margin: 0 auto; }
        .sidebar {
            width: 200px; background: var(--card-bg); border-right: 1px solid var(--border);
            padding: 16px 10px; flex-shrink: 0; position: sticky; top: 56px;
            height: calc(100vh - 56px); overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
        }
        .sidebar .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
            font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);
            border: none; background: transparent; width: 100%; text-align: left;
        }
        .sidebar .nav-item:hover { background: #f5f6f8; color: var(--text); }
        .sidebar .nav-item.active { background: var(--accent-light); color: var(--accent-dark); font-weight: 600; }
        .sidebar .nav-item .nav-icon { font-size: 1.2rem; width: 22px; text-align: center; }
        .sidebar-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: #999; padding: 4px 14px; font-weight: 600; margin-top: 8px; }
        .main-content { flex: 1; padding: 20px 24px; overflow-y: auto; }
        .view { display: none; animation: fadeSlideIn 0.25s ease; }
        .view.active { display: block; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); margin-bottom: 16px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .card-title { font-size: 1.05rem; font-weight: 700; }
        .search-hero input { width: 100%; padding: 16px 50px 16px 20px; font-size: 1.05rem; border: 2px solid var(--border); border-radius: var(--radius-lg); background: var(--card-bg); outline: none; transition: var(--transition); }
        .search-hero input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(240,160,48,0.1); }
        .search-hero { position: relative; margin-bottom: 20px; }
        .search-hero .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 1.4rem; color: #999; }
        .result-card { background: var(--card-bg); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: var(--transition); position: relative; box-shadow: var(--shadow-sm); }
        .result-card:hover { border-color: var(--accent); transform: translateY(-1px); }
        .result-card .q-text { font-weight: 600; margin-bottom: 8px; padding-right: 60px; }
        .result-card .q-text mark { background: #fef3c7; color: #92400e; padding: 1px 4px; border-radius: 3px; }
        .result-card .a-text { background: var(--success-light); padding: 10px 14px; border-radius: var(--radius-sm); font-weight: 600; color: #166534; border-left: 3px solid var(--success); margin-top: 8px; cursor: pointer; }
        .result-card .a-text:hover { background: #d1fae5; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.9rem; font-family: inherit; background: #fafbfc; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(240,160,48,0.08); background: #fff; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 150px; }
        .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px; text-align: center; cursor: pointer; transition: var(--transition); background: #fafbfc; position: relative; }
        .upload-zone:hover { border-color: var(--accent); background: #fffdf7; }
        .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-light); }
        .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .image-preview-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .image-preview-item { position: relative; width: 80px; height: 80px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
        .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview-item .remove-btn { position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
        .btn { padding: 10px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--accent); color: #1a1a2e; }
        .btn-primary:hover { background: #f5b545; }
        .btn-secondary { background: #f0f1f3; color: var(--text); }
        .btn-danger { background: var(--danger-light); color: var(--danger); }
        .btn-sm { padding: 5px 12px; font-size: 0.78rem; border-radius: 6px; }
        .btn-ocr { background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe; }
        .ocr-progress { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #eef2ff; border-radius: var(--radius-sm); font-size: 0.8rem; color: #4f46e5; margin-top: 8px; }
        .ocr-progress .spinner { width: 16px; height: 16px; border: 2px solid #c7d2fe; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .question-list-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border-bottom: 1px solid #f0f1f3; border-radius: var(--radius-sm); }
        .question-list-item:hover { background: #fafbfc; }
        .question-list-item .q-index { width: 32px; height: 32px; border-radius: 50%; background: #f0f1f3; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; color: #666; flex-shrink: 0; }
        .question-list-item .q-info { flex: 1; min-width: 0; }
        .question-list-item .q-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .question-list-item .q-meta { font-size: 0.72rem; color: #999; display: flex; gap: 6px; flex-wrap: wrap; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal { background: #fff; border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
        .modal h3 { margin-bottom: 16px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; z-index: 300; animation: toastIn 0.3s ease; }
        .toast.success { background: var(--success); }
        .batch-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .batch-item:last-child { border-bottom: none; }
        .batch-item input[type="checkbox"] { margin-top: 3px; }
        .batch-item .preview { flex:1; font-size:0.85rem; }
        .img-lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 250; display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
        .img-lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; bottom: 0; left: 0; right: 0; height: auto; flex-direction: row; padding: 6px 8px; border-top: 1px solid var(--border); z-index: 100; overflow-x: auto; justify-content: space-around; background: #fff; }
            .sidebar .nav-item { flex-direction: column; gap: 2px; padding: 6px 8px; font-size: 0.7rem; text-align: center; }
            .main-content { padding: 12px 10px 80px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><div class="logo-icon">🚁</div><span>大疆考试管理</span></div>
        <div class="navbar-actions">
            <div class="nav-stat">📚 <strong id="totalCount">0</strong> 题</div>
            <button class="btn-icon" title="导出备份" onclick="exportData()">💾</button>
            <button class="btn-icon" title="导入题库" onclick="document.getElementById('importFileInput').click()">📥</button>
            <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importData(event)">
        </div>
    </nav>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-label">功能</div>
            <button class="nav-item active" data-view="search" onclick="switchView('search')"><span class="nav-icon">🔍</span>考试速查</button>
            <button class="nav-item" data-view="add" onclick="switchView('add')"><span class="nav-icon">➕</span>录入题目</button>
            <button class="nav-item" data-view="library" onclick="switchView('library')"><span class="nav-icon">📋</span>题库管理</button>
            <button class="nav-item" data-view="manage" onclick="switchView('manage')"><span class="nav-icon">⚙️</span>数据管理</button>
        </aside>

        <main class="main-content">
            <!-- 考试速查 -->
            <div class="view active" id="view-search">
                <div class="search-hero">
                    <input type="text" id="searchInput" placeholder="输入题目关键词，精准查找答案..." autocomplete="off" oninput="performSearch()">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="search-results-count" id="searchCount"></div>
                <div id="searchResults"></div>
            </div>

            <!-- 录入题目 -->
            <div class="view" id="view-add">
                <div class="card">
                    <div class="card-header"><span class="card-title">📝 录入新题目</span><span>支持图片粘贴、OCR识别、智能多题拆分</span></div>
                    <form id="addQuestionForm" onsubmit="saveQuestion(event)">
                        <div class="form-group">
                            <label>📋 智能粘贴区（粘贴文字或OCR自动填入，可自动拆分多道题）</label>
                            <textarea id="smartPasteArea" placeholder="支持多种格式：&#10;格式1：题目：xxx&#10;答案：xxx&#10;格式2：1. 题目内容&#10;A. 选项A B. 选项B&#10;答案：A&#10;格式3：纯文本段落（自动识别第一句为题目）" rows="6" style="font-family: var(--font-mono), monospace;"></textarea>
                            <div style="display:flex; gap:8px; margin-top:6px;">
                                <button type="button" class="btn btn-sm btn-primary" onclick="smartParseAndShowBatch()">🔮 智能解析并预览</button>
                                <button type="button" class="btn btn-sm btn-secondary" onclick="smartParseSingle()">📝 仅解析第一题填入</button>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>题型</label><select id="qType"><option value="choice">选择题</option><option value="judgment">判断题</option><option value="essay">简答题</option></select></div>
                            <div class="form-group"><label>标签</label><input type="text" id="qTags" placeholder="如：飞行法规,安全"></div>
                        </div>
                        <div class="form-group"><label>题目内容 *</label><textarea id="qQuestion" required rows="2"></textarea></div>
                        <div class="form-group" id="optionsGroup"><label>选项（每行一个）</label><textarea id="qOptions" rows="4" placeholder="A. 选项A&#10;B. 选项B&#10;C. 选项C&#10;D. 选项D"></textarea></div>
                        <div class="form-group"><label>正确答案 *</label><input type="text" id="qAnswer" required placeholder="选择题填字母，判断题填对/错"></div>
                        <div class="form-group"><label>备注/解析</label><textarea id="qNotes" rows="2"></textarea></div>
                        <div class="form-group">
                            <label>📷 图片（可拖拽、点击或直接 Ctrl+V 粘贴）</label>
                            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('imageInput').click()">
                                <span>🖼️ 点击上传 / 拖拽图片 / 直接粘贴</span>
                                <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImageUpload(event)" style="display:none;">
                            </div>
                            <div class="image-preview-list" id="imagePreviewList"></div>
                            <button type="button" class="btn btn-sm btn-ocr" id="ocrBtn" style="margin-top:6px;display:none;" onclick="runOCR()">🔤 手动OCR识别</button>
                            <div class="ocr-progress" id="ocrProgress" style="display:none;"><div class="spinner"></div><span>识别中...</span></div>
                        </div>
                        <div style="display:flex;gap:10px;">
                            <button type="submit" class="btn btn-primary">✅ 保存当前题目</button>
                            <button type="button" class="btn btn-secondary" onclick="clearForm()">🔄 清空表单</button>
                        </div>
                        <input type="hidden" id="editId" value="">
                    </form>
                </div>
            </div>

            <!-- 题库管理 -->
            <div class="view" id="view-library">
                <div class="card-header">
                    <span class="card-title">📋 题库列表</span>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="librarySearch" placeholder="筛选题目..." style="padding:8px;border-radius:20px;border:1px solid var(--border);" oninput="renderLibrary()">
                        <select id="libraryTypeFilter" onchange="renderLibrary()" style="padding:8px;border-radius:20px;border:1px solid var(--border);">
                            <option value="all">全部</option><option value="choice">选择题</option><option value="judgment">判断题</option><option value="essay">简答题</option>
                        </select>
                    </div>
                </div>
                <div class="card" id="libraryList" style="max-height:65vh;overflow-y:auto;"></div>
                <div style="display:flex;justify-content:space-between;margin-top:8px;">
                    <span id="libraryCount">共 0 题</span>
                    <button class="btn btn-sm btn-danger" onclick="clearAllQuestions()">🗑️ 清空题库</button>
                </div>
            </div>

            <!-- 数据管理 -->
            <div class="view" id="view-manage">
                <div class="card">
                    <div class="card-title">⚙️ 数据管理</div>
                    <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:16px;">所有数据保存在浏览器本地存储中，建议定期导出备份。</p>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <button class="btn btn-primary" onclick="exportData()">💾 导出JSON</button>
                        <button class="btn btn-secondary" onclick="document.getElementById('importFileInput').click()">📥 导入合并</button>
                        <button class="btn btn-secondary" onclick="exportCSV()">📊 导出CSV</button>
                        <button class="btn btn-danger" onclick="clearAllQuestions()">🗑️ 清空数据</button>
                    </div>
                    <div id="storageInfo" style="margin-top:16px;font-size:0.8rem;color:var(--text-secondary);"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 批量导入预览弹窗 -->
    <div class="modal-overlay" id="batchModal" style="display:none;" onclick="if(event.target===this)closeBatchModal()">
        <div class="modal">
            <h3>📋 批量导入预览（共 <span id="batchCount">0</span> 题）</h3>
            <div id="batchList" style="max-height:50vh;overflow-y:auto;margin-bottom:16px;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <label><input type="checkbox" id="selectAllBatch" onchange="toggleSelectAll()" checked> 全选</label>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-secondary" onclick="closeBatchModal()">取消</button>
                    <button class="btn btn-primary" onclick="importBatchQuestions()">✅ 导入选中题目</button>
                </div>
            </div>
        </div>
    </div>

    <div class="img-lightbox" id="imgLightbox" style="display:none;" onclick="this.style.display='none'"><img src="" id="lightboxImg"></div>
    <div class="modal-overlay" id="editModal" style="display:none;" onclick="if(event.target===this)closeEditModal()">
        <div class="modal">
            <h3>✏️ 编辑题目</h3>
            <form id="editForm" onsubmit="submitEdit(event)">
                <div class="form-group"><label>题型</label><select id="editType"><option value="choice">选择题</option><option value="judgment">判断题</option><option value="essay">简答题</option></select></div>
                <div class="form-group"><label>题目</label><textarea id="editQuestion" required rows="2"></textarea></div>
                <div class="form-group" id="editOptionsGroup"><label>选项</label><textarea id="editOptions" rows="3"></textarea></div>
                <div class="form-group"><label>答案</label><input type="text" id="editAnswer" required></div>
                <div class="form-group"><label>标签</label><input type="text" id="editTags"></div>
                <div class="form-group"><label>备注</label><textarea id="editNotes" rows="2"></textarea></div>
                <input type="hidden" id="editIdInput">
                <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </div>
            </form>
        </div>
    </div>
    <div id="toastContainer"></div>

    <script>
        // ==================== 全局状态 ====================
        const STORAGE_KEY = 'dj_exam_questions_v2';
        let questions = [];
        let currentView = 'search';
        let pendingImages = [];
        let currentBatch = [];

        function generateId() { return 'q_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }
        function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function escapeAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
        function showToast(msg, type='') {
            const t = document.createElement('div'); t.className = 'toast '+type; t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        // ==================== 数据持久化 ====================
        function loadQuestions() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                questions = raw ? JSON.parse(raw) : [];
                questions = questions.map(q => ({
                    id: q.id || generateId(),
                    type: q.type || 'essay',
                    question: q.question || '',
                    answer: q.answer || '',
                    options: Array.isArray(q.options) ? q.options : [],
                    tags: Array.isArray(q.tags) ? q.tags : [],
                    notes: q.notes || '',
                    images: Array.isArray(q.images) ? q.images : [],
                    createdAt: q.createdAt || new Date().toISOString(),
                    updatedAt: q.updatedAt || new Date().toISOString()
                }));
                saveQuestions();
            } catch(e) { questions = []; }
        }
        function saveQuestions() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(questions)); updateStats(); } catch(e) { showToast('存储空间不足','error'); } }
        function updateStats() {
            document.getElementById('totalCount').textContent = questions.length;
            document.getElementById('libraryCount').textContent = `共 ${questions.length} 题`;
            try { const used = new Blob([localStorage.getItem(STORAGE_KEY)||'']).size; document.getElementById('storageInfo').textContent = `已使用约 ${(used/1024).toFixed(1)} KB`; } catch(e){}
        }

        // ==================== 视图切换 ====================
        function switchView(viewName) {
            currentView = viewName;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
            const viewEl = document.getElementById('view-' + viewName);
            if (viewEl) viewEl.classList.add('active');
            const navItem = document.querySelector(`.nav-item[data-view="${viewName}"]`);
            if (navItem) navItem.classList.add('active');
            if (viewName === 'library') renderLibrary();
            if (viewName === 'search') { document.getElementById('searchInput').focus(); performSearch(); }
            if (viewName === 'manage') updateStats();
            if (viewName === 'add') { renderPendingImages(); updateOcrButton(); }
        }

        // ==================== 搜索功能 ====================
        function performSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const container = document.getElementById('searchResults');
            const countEl = document.getElementById('searchCount');
            if (!query) { container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">💡 输入关键词搜索题库</div>'; countEl.innerHTML = ''; return; }
            const scored = questions.map(q => {
                let score = 0;
                const ql = q.question.toLowerCase(), al = q.answer.toLowerCase(), tl = (q.tags||[]).join(' ').toLowerCase();
                if (ql.includes(query)) score+=100;
                if (al.includes(query)) score+=90;
                if (tl.includes(query)) score+=80;
                return {q, score};
            }).filter(s => s.score > 0).sort((a,b) => b.score - a.score);
            countEl.innerHTML = scored.length ? `找到 <strong>${scored.length}</strong> 条结果` : '未找到结果';
            container.innerHTML = scored.map(({q})=>`
                <div class="result-card" onclick="copyAnswer('${escapeAttr(q.answer)}')">
                    <div class="q-text">${highlight(q.question, query)}</div>
                    ${q.options.length ? '<div style="font-size:0.8rem;color:#666;">'+q.options.join(' | ')+'</div>' : ''}
                    ${q.images.map(i=>`<img src="${i}" class="img-thumb" onclick="event.stopPropagation(); openLightbox('${i}')">`).join('')}
                    <div class="a-text" onclick="event.stopPropagation(); copyAnswerDirect('${escapeAttr(q.answer)}')">✅ 答案：<strong>${highlight(q.answer, query)}</strong></div>
                </div>`).join('');
        }
        function highlight(text, query) {
            if(!query) return text;
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }
        function copyAnswer(ans) { navigator.clipboard.writeText(ans).then(()=>showToast('📋 答案已复制','success')); }
        function copyAnswerDirect(ans) { navigator.clipboard.writeText(ans).then(()=>showToast('📋 答案已复制','success')); }
        function openLightbox(src) { document.getElementById('lightboxImg').src=src; document.getElementById('imgLightbox').style.display='flex'; }

        // ==================== 图片处理 & OCR ====================
        function compressImage(file, callback, maxW=800, q=0.7) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w=img.width, h=img.height;
                    if(w>maxW){ h = (h/w)*maxW; w=maxW; }
                    if(h>maxW){ w = (w/h)*maxW; h=maxW; }
                    canvas.width=w; canvas.height=h;
                    canvas.getContext('2d').drawImage(img,0,0,w,h);
                    callback(canvas.toDataURL('image/jpeg', q));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        function handleImageUpload(event) {
            const files = event.target.files;
            if(!files) return;
            Array.from(files).forEach(f => { if(f.type.startsWith('image/')) compressImage(f, b64 => { pendingImages.push(b64); renderPendingImages(); updateOcrButton(); }); });
            event.target.value = '';
        }
        function renderPendingImages() {
            document.getElementById('imagePreviewList').innerHTML = pendingImages.map((img,i) => `
                <div class="image-preview-item"><img src="${img}" onclick="openLightbox('${img}')"><button class="remove-btn" onclick="pendingImages.splice(${i},1); renderPendingImages(); updateOcrButton();">×</button></div>`).join('');
        }
        function updateOcrButton() { document.getElementById('ocrBtn').style.display = pendingImages.length ? '' : 'none'; }

        async function runOCR(silent=false) {
            if(!pendingImages.length) { if(!silent) showToast('请先添加图片','error'); return; }
            const btn = document.getElementById('ocrBtn'), prog = document.getElementById('ocrProgress');
            btn.disabled = true; prog.style.display = 'flex';
            try {
                if(typeof Tesseract === 'undefined') {
                    prog.querySelector('span').textContent = '加载OCR引擎...';
                    await new Promise((res,rej) => {
                        if(document.querySelector('script[src*="tesseract"]')) return res();
                        const s = document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
                        s.onload=res; s.onerror=rej; document.head.appendChild(s);
                    });
                }
                const worker = await Tesseract.createWorker('chi_sim+eng', 1, { logger: m => {
                    if(m.status==='recognizing text') prog.querySelector('span').textContent = `识别中 ${Math.round(m.progress*100)}%`;
                }});
                let rawText = '';
                for(let i=0; i<pendingImages.length; i++) {
                    prog.querySelector('span').textContent = `识别第 ${i+1}/${pendingImages.length} 张...`;
                    const {data:{text}} = await worker.recognize(pendingImages[i]);
                    rawText += text + '\n';
                }
                await worker.terminate();
                const cleanedText = cleanOCRText(rawText);
                if(cleanedText.trim()) {
                    document.getElementById('smartPasteArea').value = cleanedText;
                    if(!silent) showToast('✅ OCR完成，正在智能解析...','success');
                    const parsed = parseQuestionsFromText(cleanedText);
                    if(parsed.length >= 1) {
                        showBatchModal(parsed); // 始终弹出预览窗口供确认
                    } else {
                        showToast('未能解析出题目，请手动整理后点击“智能解析”', 'error');
                    }
                } else { if(!silent) showToast('未识别到文字','error'); }
            } catch(e) { if(!silent) showToast('OCR失败: '+e.message,'error'); }
            finally { btn.disabled = false; prog.style.display = 'none'; }
        }

        function cleanOCRText(text) {
            // 合并断行：单个换行符替换为空格，保留双换行作为段落分隔
            let cleaned = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            // 去除页码、多余空白
            cleaned = cleaned.replace(/^\d+\s*$/gm, ''); // 独立数字行
            cleaned = cleaned.replace(/[ \t]+/g, ' ');
            // 将单换行（非空行）合并为一行，但保留选项前的换行
            cleaned = cleaned.replace(/(?<!\n)\n(?!\n)/g, ' ');
            // 修复选项粘连：在 A. B. C. D. 前插入换行
            cleaned = cleaned.replace(/([A-D])[\.\、\)]\s*/g, '\n$1. ');
            // 答案关键字前换行
            cleaned = cleaned.replace(/(答案[：:])/g, '\n$1');
            cleaned = cleaned.replace(/\n{3,}/g, '\n\n');
            return cleaned.trim();
        }

        // ==================== 粘贴图片监听 ====================
        function setupPasteListener() {
            document.addEventListener('paste', async (e) => {
                if(currentView !== 'add') return;
                const items = e.clipboardData?.items;
                if(!items) return;
                for(const item of items) {
                    if(item.type.startsWith('image/')) {
                        e.preventDefault();
                        const file = item.getAsFile();
                        if(file) {
                            compressImage(file, b64 => {
                                pendingImages.push(b64);
                                renderPendingImages();
                                updateOcrButton();
                                showToast('📷 图片已粘贴，自动识别中...','success');
                                setTimeout(() => runOCR(true), 150);
                            });
                        }
                    }
                }
            });
        }

        // ==================== 智能解析（重构版） ====================
        function parseQuestionsFromText(text) {
            if (!text) return [];
            const blocks = splitIntoQuestionBlocks(text);
            return blocks.map(block => parseSingleBlock(block)).filter(q => q && q.question);
        }

        function splitIntoQuestionBlocks(text) {
            // 策略1: 按“题目：”、“数字.”、“中文数字.”等拆分
            const markers = [
                /题目[：:]/g,
                /^\d+[\.\、\)]\s*/gm,
                /^[一二三四五六七八九十]+[\.\、\)]\s*/gm,
                /^[（(]?\d+[）)]?\s*/gm
            ];
            let parts = [text];
            for (const regex of markers) {
                const newParts = [];
                for (const part of parts) {
                    const split = part.split(regex).filter(s => s.trim());
                    if (split.length > 1) {
                        newParts.push(...split);
                    } else {
                        newParts.push(part);
                    }
                }
                parts = newParts;
            }
            // 去重并清理
            return parts.map(p => p.trim()).filter(p => p.length > 5);
        }

        function parseSingleBlock(text) {
            let question = '', answer = '', options = [], type = 'essay';
            // 预处理：提取选项行
            const optionLines = [];
            const mainLines = [];
            text.split('\n').forEach(line => {
                const trimmed = line.trim();
                if (/^[A-D][\.\、\)]\s*.+/.test(trimmed)) {
                    optionLines.push(trimmed);
                } else {
                    mainLines.push(trimmed);
                }
            });
            const mainText = mainLines.join(' ').trim();

            // 提取答案
            const ansMatch = mainText.match(/答案[：:]\s*(.+?)(?:\n|$)/);
            if (ansMatch) answer = ansMatch[1].trim();
            // 从选项行中提取答案（如 "答案：A"）
            if (!answer && optionLines.length) {
                const lastOpt = optionLines[optionLines.length-1];
                const lastAns = lastOpt.match(/答案[：:]\s*([A-D])/i);
                if (lastAns) answer = lastAns[1].toUpperCase();
            }

            // 提取题目：去除答案部分后的文本
            let questionText = mainText.replace(/答案[：:].*$/, '').trim();
            // 如果仍为空，尝试用第一行
            if (!questionText && mainLines.length > 0) {
                questionText = mainLines[0];
            }
            question = questionText;

            // 处理选项
            if (optionLines.length) {
                options = optionLines.filter(o => !/答案/.test(o));
                type = 'choice';
            }

            // 判断题型
            if (answer === '对' || answer === '错' || answer === '正确' || answer === '错误' || answer === '√' || answer === '×') {
                type = 'judgment';
            }
            if (!question) return null;
            return { question, answer, options, type };
        }

        function fillFormWithQuestion(qObj) {
            document.getElementById('qQuestion').value = qObj.question || '';
            document.getElementById('qAnswer').value = qObj.answer || '';
            document.getElementById('qOptions').value = (qObj.options || []).join('\n');
            document.getElementById('qType').value = qObj.type || 'essay';
            updateOptionsVisibility();
        }

        // 批量导入弹窗
        function showBatchModal(parsedQuestions) {
            currentBatch = parsedQuestions.map(q => ({...q, selected: true}));
            renderBatchList();
            document.getElementById('batchModal').style.display = 'flex';
        }
        function closeBatchModal() { document.getElementById('batchModal').style.display = 'none'; }
        function renderBatchList() {
            document.getElementById('batchCount').textContent = currentBatch.length;
            const list = document.getElementById('batchList');
            list.innerHTML = currentBatch.map((q, i) => `
                <div class="batch-item">
                    <input type="checkbox" ${q.selected ? 'checked' : ''} onchange="currentBatch[${i}].selected = this.checked">
                    <div class="preview">
                        <strong>${escapeHtml(q.question)}</strong>
                        <div style="color:#666;">类型：${q.type} | 答案：${escapeHtml(q.answer)}</div>
                        ${q.options.length ? '<div style="font-size:0.75rem;">选项：'+q.options.join('; ')+'</div>' : ''}
                    </div>
                </div>
            `).join('');
        }
        function toggleSelectAll() {
            const checked = document.getElementById('selectAllBatch').checked;
            currentBatch.forEach(q => q.selected = checked);
            renderBatchList();
        }
        function importBatchQuestions() {
            const selected = currentBatch.filter(q => q.selected);
            if (!selected.length) { showToast('请至少选择一道题','error'); return; }
            selected.forEach(q => {
                questions.unshift({
                    id: generateId(), type: q.type, question: q.question, answer: q.answer,
                    options: q.options, tags: [], notes: '', images: [...pendingImages],
                    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
                });
            });
            saveQuestions(); closeBatchModal();
            showToast(`✅ 成功导入 ${selected.length} 道题目`, 'success');
            renderLibrary();
            document.getElementById('smartPasteArea').value = '';
            pendingImages = []; renderPendingImages(); updateOcrButton();
        }

        function smartParseAndShowBatch() {
            const text = document.getElementById('smartPasteArea').value.trim();
            if (!text) return showToast('请先输入文字','error');
            const parsed = parseQuestionsFromText(text);
            if (!parsed.length) return showToast('未解析到题目，请调整文本格式','error');
            showBatchModal(parsed);
        }
        function smartParseSingle() {
            const text = document.getElementById('smartPasteArea').value.trim();
            if (!text) return showToast('请先输入文字','error');
            const parsed = parseQuestionsFromText(text);
            if (parsed.length) {
                fillFormWithQuestion(parsed[0]);
                showToast('已填入第一道题目','success');
            } else showToast('未识别到题目','error');
        }

        function updateOptionsVisibility() {
            document.getElementById('optionsGroup').style.display = document.getElementById('qType').value === 'choice' ? '' : 'none';
        }

        // ==================== 保存/清空 ====================
        function saveQuestion(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const question = document.getElementById('qQuestion').value.trim();
            const answer = document.getElementById('qAnswer').value.trim();
            if(!question || !answer) return showToast('题目和答案不能为空','error');
            const qData = {
                id: editId || generateId(),
                type: document.getElementById('qType').value, question, answer,
                options: document.getElementById('qType').value==='choice' ? document.getElementById('qOptions').value.split('\n').filter(Boolean) : [],
                tags: document.getElementById('qTags').value.split(/[,，\s]+/).filter(Boolean),
                notes: document.getElementById('qNotes').value.trim(),
                images: [...pendingImages],
                createdAt: editId ? (questions.find(q=>q.id===editId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            if(editId) {
                const idx = questions.findIndex(q=>q.id===editId);
                if(idx>=0) { qData.createdAt = questions[idx].createdAt; questions[idx] = qData; }
            } else { questions.unshift(qData); }
            saveQuestions(); clearForm();
            pendingImages=[]; renderPendingImages(); updateOcrButton();
            document.getElementById('smartPasteArea').value = '';
            showToast('✅ 已保存','success');
            switchView('library'); renderLibrary();
        }
        function clearForm() {
            document.getElementById('qQuestion').value = '';
            document.getElementById('qAnswer').value = '';
            document.getElementById('qOptions').value = '';
            document.getElementById('qTags').value = '';
            document.getElementById('qNotes').value = '';
            document.getElementById('editId').value = '';
            pendingImages = []; renderPendingImages(); updateOcrButton();
            document.getElementById('qType').value = 'choice'; updateOptionsVisibility();
        }

        // ==================== 题库管理 ====================
        function renderLibrary() {
            const search = (document.getElementById('librarySearch')?.value||'').toLowerCase();
            const type = document.getElementById('libraryTypeFilter')?.value||'all';
            let filtered = questions.filter(q => (type==='all' || q.type===type) && (!search || q.question.toLowerCase().includes(search) || q.answer.toLowerCase().includes(search)));
            document.getElementById('libraryCount').textContent = `显示 ${filtered.length} / ${questions.length} 题`;
            const container = document.getElementById('libraryList');
            container.innerHTML = filtered.length ? filtered.map((q,i) => `
                <div class="question-list-item">
                    <div class="q-index">${i+1}</div><div class="q-info"><div class="q-title">${escapeHtml(q.question)}</div><div class="q-meta">答案：${escapeHtml(q.answer)} | ${q.type}</div></div>
                    <div style="display:flex;gap:4px;"><button class="btn btn-sm btn-secondary" onclick="editQuestion('${q.id}')">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteQuestion('${q.id}')">🗑️</button></div>
                </div>`).join('') : '<div style="text-align:center;padding:40px;color:#999;">📭 无匹配题目</div>';
        }
        function editQuestion(id) {
            const q = questions.find(q=>q.id===id); if(!q) return;
            document.getElementById('editIdInput').value = q.id; document.getElementById('editType').value = q.type;
            document.getElementById('editQuestion').value = q.question; document.getElementById('editAnswer').value = q.answer;
            document.getElementById('editOptions').value = (q.options||[]).join('\n'); document.getElementById('editTags').value = (q.tags||[]).join(', ');
            document.getElementById('editNotes').value = q.notes||''; document.getElementById('editOptionsGroup').style.display = q.type==='choice'?'':'none';
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('editType').onchange = function(){ document.getElementById('editOptionsGroup').style.display = this.value==='choice'?'':'none'; };
        }
        function submitEdit(e) {
            e.preventDefault(); const id = document.getElementById('editIdInput').value;
            const idx = questions.findIndex(q=>q.id===id); if(idx<0) return;
            questions[idx].type = document.getElementById('editType').value; questions[idx].question = document.getElementById('editQuestion').value.trim();
            questions[idx].answer = document.getElementById('editAnswer').value.trim();
            questions[idx].options = document.getElementById('editType').value==='choice' ? document.getElementById('editOptions').value.split('\n').filter(Boolean) : [];
            questions[idx].tags = document.getElementById('editTags').value.split(/[,，\s]+/).filter(Boolean);
            questions[idx].notes = document.getElementById('editNotes').value.trim(); questions[idx].updatedAt = new Date().toISOString();
            saveQuestions(); closeEditModal(); renderLibrary(); showToast('✅ 已更新','success');
        }
        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }
        function deleteQuestion(id) { if(confirm('删除此题？')) { questions = questions.filter(q=>q.id!==id); saveQuestions(); renderLibrary(); } }
        function clearAllQuestions() { if(confirm('⚠️ 确定清空全部题库？')) { questions=[]; saveQuestions(); renderLibrary(); } }

        // ==================== 导入导出 ====================
        function exportData() {
            if(!questions.length) return showToast('题库为空','error');
            const blob = new Blob([JSON.stringify(questions,null,2)],{type:'application/json'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`大疆题库_${new Date().toISOString().slice(0,10)}.json`; a.click();
        }
        function exportCSV() {
            if(!questions.length) return showToast('题库为空','error');
            const header = '题型,题目,答案,选项,标签';
            const rows = questions.map(q=>[q.type,q.question,q.answer,(q.options||[]).join(';'),(q.tags||[]).join(',')].map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(','));
            const blob = new Blob(['\uFEFF'+header+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`大疆题库_${new Date().toISOString().slice(0,10)}.csv`; a.click();
        }
        function importData(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(!Array.isArray(data)) throw new Error('格式错误');
                    data.forEach(d => { if(!d.question||!d.answer) return; const exists = questions.findIndex(q=>q.id===d.id); const item={...d, id: d.id||generateId(), updatedAt: new Date().toISOString()}; if(exists>=0){ item.createdAt=questions[exists].createdAt; questions[exists]=item; } else questions.unshift(item); });
                    saveQuestions(); renderLibrary(); showToast('导入成功','success');
                } catch(err) { showToast('导入失败: '+err.message,'error'); }
            };
            reader.readAsText(file); event.target.value = '';
        }

        // ==================== 拖拽上传 ====================
        function setupDragDrop() {
            const zone = document.getElementById('uploadZone');
            ['dragenter','dragover'].forEach(ev=>zone.addEventListener(ev, e=>{ e.preventDefault(); zone.classList.add('drag-over'); }));
            ['dragleave','drop'].forEach(ev=>zone.addEventListener(ev, e=>{ e.preventDefault(); zone.classList.remove('drag-over'); }));
            zone.addEventListener('drop', e => { const files = e.dataTransfer.files; Array.from(files).forEach(f => { if(f.type.startsWith('image/')) compressImage(f, b64=>{ pendingImages.push(b64); renderPendingImages(); updateOcrButton(); }); }); });
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', e => {
                if((e.ctrlKey&&e.key==='k')||(e.key==='/'&&document.activeElement===document.body)) { e.preventDefault(); switchView('search'); document.getElementById('searchInput').focus(); }
                if(e.ctrlKey&&e.key==='n') { e.preventDefault(); switchView('add'); }
                if(e.key==='Escape') { closeEditModal(); closeBatchModal(); document.getElementById('imgLightbox').style.display='none'; }
            });
        }

        function init() {
            loadQuestions(); updateStats(); setupDragDrop(); setupKeyboardShortcuts(); setupPasteListener();
            document.getElementById('qType').addEventListener('change', updateOptionsVisibility);
            renderLibrary();
        }
        init();
    </script>
</body>
